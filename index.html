<!DOCTYPE html>
<html lang="en" xml:lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="Jolene Langlinais" content="Personal Website" />
    <meta name="description" content="Jolene Langlinais's personal website with links to resources including code, blogs, talks, and contact.">
    <!-- <link rel="manifest" href="manifest.json" /> -->
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="stylesheet" href="light.css" id="theme">
    <title>Jolene Langlinais</title>
    <script src="https://kit.fontawesome.com/860fc47340.js"></script>
    <script>
        function switchLightOrDark() {
            let theme = document.getElementById("theme");
            let el = document.getElementById("lightOrDarkButton");
            
            if (theme.getAttribute("href") == "light.css") {
                theme.href = "dark.css";
                el.firstChild.data = "☀️";
            } else {
                theme.href = "light.css";
                el.firstChild.data = "🌙";
            }
        }
    </script>
    <script>
        function showCV() {
            document.getElementById("bodyId").innerHTML = '<iframe src="https://docs.google.com/gview?url=https://github.com/irmerk/outreach/raw/master/Jolene%20Langlinais%20CV.pdf&embedded=true" style="width:100%; height:100%;" frameborder="0"></iframe>'
            document.getElementById("bodyId").style["height"] = "100vh";
        }
    </script>
  </head>
  <body id="bodyId">
    <div id="page">
        <div id="main">
            <a href="https://jolenelanglinais.com">
                <img src="./logo.png" id="headshot" alt="Headshot Image">
            </a>
            <a href="https://jolenelanglinais.com">
                <h1>Jolene Langlinais</h1>
            </a>
            <p>
                A full stack software engineer at <a href="https://clause.io" rel="noopener" target="_blank" class="headerLink">Clause</a> and maintainer at the <a href="https://www.accordproject.org" rel="noopener" target="_blank" class="headerLink">Accord Project</a>, designing sophisticated systems with code.
            </p>
        </div>
        <div id="socialLink">
            <a href="https://twitter.com/jolanglinais" rel="noopener" target="_blank" aria-label="Twitter" >
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://dev.to/irmerk" rel="noopener" target="_blank" aria-label="DEV Community" >
                <i class="fab fa-dev"></i>
            </a>
            <a href="mailto:jolenelanglinais@gmail.com?subject=Greetings, Earthling" rel="noopener" target="_blank" aria-label="Email" >
                <i class="fas fa-envelope-square"></i>
            </a>
            <!-- <a href="" rel="noopener" target="_blank" aria-label="CV" onclick="showCV()">
                <i class="fas fa-file-alt"></i>
            </a> -->
            <a href="https://www.linkedin.com/in/jolene-langlinais/" rel="noopener" target="_blank" aria-label="LinkedIn" >
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://github.com/irmerk" rel="noopener" target="_blank" aria-label="GitHub" >
                <i class="fab fa-github"></i>
            </a>
        </div>
        <div>
            <button onclick="switchLightOrDark()" id="lightOrDarkButton">🌙</button>
        </div>
    </div>
  </body>
</html>
